    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {

        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="text-slate-800 antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom LocalStorage database implementation as fallback
        const LOCAL_STORAGE_KEY = 'mindfulness_bot_records';
        const getLocalRecords = () => {
            const data = localStorage.getItem(LOCAL_STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        };
        const saveLocalRecord = (record) => {
            const records = getLocalRecords();
            const newRecord = { ...record, id: Date.now().toString(), created_at: new Date().toISOString() };
            records.unshift(newRecord);
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(records));
            return newRecord;
        };
        const deleteLocalRecord = (id) => {
            const records = getLocalRecords();
            const updated = records.filter(r => r.id !== id);
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated));
        };

        // Static Image Paths or Placeholders using Unsplash
        const PRESET_IMAGES = [
            "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=600&q=80", // Meditation
            "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=600&q=80", // Forest/Lake
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=600&q=80"  // Zen stones
        ];

        // Content Generator Helper
        function generateContents(originalText, topic) {
            const cleanTopicTag = topic.replace(/\s+/g, '');
            
            const blog = `[블로그 포스팅: ${topic}의 길]

마음이 복잡하고 지친 하루의 끝, 문득 스스로에게 이런 질문을 던져보게 됩니다.
"지금 당신의 마음은 진정으로 편안하고 고요한가요?"

오늘 기록해주신 한 분의 이야기를 조심스럽게 꺼내어 봅니다.
"${originalText}"

이 글 속에는 매일 바쁘게 살아가며 놓쳐버린 우리의 마음자리가 담겨 있습니다.
우리는 때로 주변 사람들의 시선이나 작은 자극에도 쉽게 휩쓸리며, 내 안의 불안과 분노의 파도에 힘들어하곤 합니다.
하지만 중요한 것은 그 마음의 파도를 억지로 누르거나 피하려 하지 않는 것입니다.

이번 ${topic}을(를) 통과하는 핵심은 나 자신을 억지로 바꾸려 하지 않고, 일어나는 감정을 있는 그대로 바라보는 데 있습니다.
잠시 가쁜 숨을 고르고, 내 마음의 바다에 일어나는 성난 파도가 스스로 잦아들 때까지 그저 지켜봐 주세요.

기억하세요. 우리는 언제나 고요하고 맑은 본래의 바다를 품고 있습니다. 

사랑이라는 이름으로 누군가를 바꾸려다 서로에게 상처만 남기고 계시지는 않나요? 그 먹먹한 마음을 제가 함께 나누겠습니다. 아래 댓글이나 쪽지로 마음을 전해주시면, 따뜻한 햇볕 같은 마음으로 여러분의 이야기를 경청하고 함께 길을 찾아가겠습니다. 🌿`;

            const meditation = `오늘의 마음 명상

[주제: ${topic}]

[깊이 있는 문장]
"${topic}을(를) 품는 다는 것은 밖을 향해 달리는 집착과 시선을 내 안으로 거두어들여, 나의 내면을 비추는 영원하고 고요한 등불을 켜는 일입니다."

[자기를 돌아보는 질문]
- 오늘 하루, 타인의 평가나 시선에 얽매여 나답게 살지 못했던 순간은 없었나요?
- 내 뜻대로 상황을 통제하기 위해 애쓰다 스스로 마음의 병을 깊게 만들지는 않았나요?
- ${topic}의 가치를 잊은 채, 내 욕심과 집착으로 나와 소중한 사람을 괴롭히지는 않았나요?

[명상 가이드 및 신체 변화]
가만히 편안한 자세를 취하고 눈을 감습니다.
천천히 들이마시고 내쉬는 숨에 의식을 집중해 보세요. 
깊은 호흡을 반복할수록 뇌파가 가라앉고, 머리가 맑아지며, 가슴속에 차갑게 굳어 있던 응어리가 사르르 녹아내리는 것을 서서히 느끼실 수 있습니다.
머리로만 머물던 평온이 가슴과 몸 전체로 고요하게 퍼져나갈 때, 우리는 온전한 마음 비움에 가닿을 수 있게 됩니다.`;

            const instagram = `✨ ${topic} : 하루 끝, 지친 마음에 건네는 따뜻한 위로 🌿

오늘 내 마음에 휘몰아친 감정의 바람이 있나요?
불안해하거나 억지로 이겨내려고 애쓰지 않아도 괜찮습니다.
그저 가만히 있는 그대로의 마음을 바라보고 숨 한번 깊게 쉬어보세요.
마음을 가볍게 비워내고 스스로에게 따뜻한 온기를 선물하는 밤이 되시길 바랍니다.

_
#마음수련 #명상 #${cleanTopicTag} #마음공부 #마음챙김 #힐링 #자기성찰 #스트레스해소 #마음여행`;

            const youtube = `[유튜브 쇼츠 / 릴스 대본]

[오프닝 멘트]
(차분하고 잔잔한 목소리로) 
"안녕하세요. 오늘도 정말 고생 많으셨습니다. 하던 일을 잠시 멈추고 몸의 긴장을 풀어보세요. 오늘 함께 나눌 이야기는 바로 '${topic}'입니다."

[화面 자막용 핵심 텍스트]
- 내 마음 속 거친 파도 바라보기
- 힘겨웠던 상황에서 한 걸음 물러나기
- 호흡에 집중하며 내면의 온기 느끼기
- 맑고 편안한 '진짜 나'로 돌아가기

[클로징 멘트]
"아주 잠깐의 호흡만으로도 당신의 마음에 고요함이 스며듭니다. 오늘의 마음 여행이 평온하셨기를 바랍니다. 편안한 밤 보내세요. 감사합니다."`;

            return { blog, meditation, instagram, youtube };
        }

        function App() {
            const [inputText, setInputText] = useState('');
            const [topic, setTopic] = useState('');
            const [results, setResults] = useState(null);
            const [records, setRecords] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTab, setActiveTab] = useState('blog');
            
            // Supabase Config State
            const [supabaseUrl, setSupabaseUrl] = useState('');
            const [supabaseKey, setSupabaseKey] = useState('');
            const [isSupabaseConnected, setIsSupabaseConnected] = useState(false);
            const [supabaseClient, setSupabaseClient] = useState(null);
            const [statusMessage, setStatusMessage] = useState({ type: '', text: '' });

            // Load Initial Data
            useEffect(() => {
                // Initialize default input if empty
                setInputText("오늘 마음속이 시끄럽고 유독 남들의 시선에 불안해하고 민감하게 반응했다. 상대방이 툭 던진 말 한마디가 계속해서 머릿속을 맴돌았고, 겉으로는 괜찮은 척했지만 가슴이 답답하고 불안했다. 저녁이 되어 생각해보니 내가 왜 그렇게 남의 시선에 흔들렸는지 나 자신을 먼저 보살펴야겠다는 생각이 든다.");
                setTopic("타인의 시선에서 벗어나 내면의 평온 찾기");

                // Try to load Env values from window/localStorage or input
                const savedUrl = localStorage.getItem('sb_url') || '';
                const savedKey = localStorage.getItem('sb_key') || '';
                if (savedUrl && savedKey) {
                    setSupabaseUrl(savedUrl);
                    setSupabaseKey(savedKey);
                    initializeSupabase(savedUrl, savedKey);
                } else {
                    loadRecords(null);
                }
            }, []);

            const initializeSupabase = (url, key) => {
                try {
                    if (url && key) {
                        const client = supabase.createClient(url, key);
                        setSupabaseClient(client);
                        setIsSupabaseConnected(true);
                        localStorage.setItem('sb_url', url);
                        localStorage.setItem('sb_key', key);
                        loadRecords(client);
                        showStatus('success', 'Supabase에 연결되었습니다.');
                    }
                } catch (error) {
                    setIsSupabaseConnected(false);
                    showStatus('error', 'Supabase 연결에 실패했습니다. 설정을 확인해 주세요.');
                    loadRecords(null);
                }
            };

            const handleConnectSupabase = (e) => {
                e.preventDefault();
                if (!supabaseUrl || !supabaseKey) {
                    showStatus('error', 'URL과 API Key를 입력하세요.');
                    return;
                }
                initializeSupabase(supabaseUrl, supabaseKey);
            };

            const handleDisconnectSupabase = () => {
                localStorage.removeItem('sb_url');
                localStorage.removeItem('sb_key');
                setSupabaseUrl('');
                setSupabaseKey('');
                setSupabaseClient(null);
                setIsSupabaseConnected(false);
                showStatus('info', '로컬 스토리지 모드로 전환되었습니다.');
                loadRecords(null);
            };

            const loadRecords = async (client) => {
                const activeClient = client || supabaseClient;
                if (activeClient && isSupabaseConnected) {
                    try {
                        const { data, error } = await activeClient
                            .from('records')
                            .select('*')
                            .order('created_at', { ascending: false });
                        if (error) throw error;
                        setRecords(data || []);
                    } catch (err) {
                        console.error('Supabase load error:', err);
                        showStatus('error', '데이터베이스 로드 실패. 로컬 데이터로 대체합니다.');
                        setRecords(getLocalRecords());
                    }
                } else {
                    setRecords(getLocalRecords());
                }
            };

            const handleLoadSample = () => {
                setInputText("바쁘게 돌아가는 일상 속에서 문득 앞만 보고 달리다가 내가 왜 이리 서두르고 있는지 회의감이 들었다. 주변 사람들의 눈치를 살피며 살아가다 보니 정작 내가 원하는 것이 무엇인지 흐릿해진 것 같다. 조용히 내면을 가꾸고 온전한 쉼을 누리고 싶다.");
                setTopic("진정한 휴식과 내면의 속도 찾기");
                showStatus('success', '추천 샘플 데이터가 로드되었습니다.');
            };

            const handleGenerate = () => {
                if (!inputText.trim() || !topic.trim()) {
                    showStatus('error', '원본 글과 명상 주제를 입력해 주세요.');
                    return;
                }
                const generated = generateContents(inputText, topic);
                setResults(generated);
                showStatus('success', '콘텐츠가 정상적으로 생성되었습니다!');
            };

            const handleSave = async () => {
                if (!results) return;
                const newRecord = {
                    title: topic,
                    input_text: inputText,
                    result_blog: results.blog,
                    result_meditation: results.meditation,
                    result_instagram: results.instagram,
                    result_youtube: results.youtube,
                    category: '마음수련'
                };

                if (supabaseClient && isSupabaseConnected) {
                    try {
                        const { error } = await supabaseClient.from('records').insert([newRecord]);
                        if (error) throw error;
                        showStatus('success', 'Supabase 클라우드 데이터베이스에 저장되었습니다.');
                        loadRecords(supabaseClient);
                    } catch (err) {
                        console.error('Save to DB error:', err);
                        showStatus('error', 'DB 저장 실패! 대신 브라우저 로컬 저장소에 보관되었습니다.');
                        saveLocalRecord(newRecord);
                        loadRecords(null);
                    }
                } else {
                    saveLocalRecord(newRecord);
                    loadRecords(null);
                    showStatus('success', '브라우저 로컬 저장소에 저장되었습니다.');
                }
            };

            const handleDelete = async (id) => {
                if (supabaseClient && isSupabaseConnected) {
                    try {
                        const { error } = await supabaseClient.from('records').delete().eq('id', id);
                        if (error) throw error;
                        showStatus('success', '기록이 삭제되었습니다.');
                        loadRecords(supabaseClient);
                    } catch (err) {
                        console.error('Delete error:', err);
                        showStatus('error', 'DB 삭제 실패!');
                    }
                } else {
                    deleteLocalRecord(id);
                    loadRecords(null);
                    showStatus('success', '로컬 기록이 삭제되었습니다.');
                }
            };

            const handleCopy = (text) => {
                navigator.clipboard.writeText(text);
                showStatus('success', '클립보드에 복사되었습니다!');
            };

            const handleDownloadAll = () => {
                if (!results) return;
                const fileContent = `========================================
[1] 블로그 수정본
========================================
${results.blog}

========================================
[2] 오늘의 마음 명상
========================================
{results.meditation}

========================================
[3] 인스타 캡션
========================================
${results.instagram}

========================================
[4] 유튜브 스크립트
========================================
${results.youtube}
`;
                const element = document.createElement("a");
                const file = new Blob([fileContent], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = `마음수련_콘텐츠_${topic.replace(/\s+/g, '_')}.txt`;
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
                showStatus('success', '텍스트 파일 다운로드가 시작되었습니다.');
            };

            const showStatus = (type, text) => {
                setStatusMessage({ type, text });
                setTimeout(() => setStatusMessage({ type: '', text: '' }), 4000);
            };

            const filteredRecords = records.filter(r => 
                r.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                r.input_text.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="bg-blue-500 text-white p-2 rounded-lg flex items-center justify-center">
                                    <i data-lucide="lotus" className="w-6 h-6"></i>🧘
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-900 tracking-tight">마음수련 콘텐츠 자동화 봇 v2.0</h1>
                                    <p className="text-xs text-slate-500">Upgrade to Vercel & Supabase</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2">
                                <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${isSupabaseConnected ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'}`}>
                                    <span className={`w-2 h-2 mr-1.5 rounded-full ${isSupabaseConnected ? 'bg-green-500' : 'bg-amber-500'}`}></span>
                                    {isSupabaseConnected ? 'Cloud DB Connected' : 'Local Storage Mode'}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Status Alert Notification */}
                    {statusMessage.text && (
                        <div className="fixed top-20 right-4 z-50 animate-bounce">
                            <div className={`p-4 rounded-lg shadow-lg text-white font-medium ${
                                statusMessage.type === 'success' ? 'bg-emerald-500' : 
                                statusMessage.type === 'error' ? 'bg-rose-500' : 'bg-blue-500'
                            }`}>
                                {statusMessage.text}
                            </div>
                        </div>
                    )}

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Left Column: Input Panel */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                <h2 className="text-lg font-semibold text-slate-900 mb-2">✍️ 생각과 감정 적기</h2>
                                <p className="text-sm text-slate-500 mb-6">오늘 있었던 일이나 떠오른 영감을 편안하게 입력해 주세요.</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">1. 원본 글 (내면의 소리 / 경험 / 느낌)</label>
                                        <textarea 
                                            value={inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            rows="6"
                                            className="w-full rounded-xl border-slate-200 focus:border-blue-500 focus:ring focus:ring-blue-200 transition p-4 border text-sm"
                                            placeholder="이곳에 기록을 작성해 주세요..."
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">2. 오늘의 명상 주제</label>
                                        <input 
                                            type="text" 
                                            value={topic}
                                            onChange={(e) => setTopic(e.target.value)}
                                            className="w-full rounded-xl border-slate-200 focus:border-blue-500 focus:ring focus:ring-blue-200 transition px-4 py-3 border text-sm"
                                            placeholder="예: 내면의 고요함, 타인과 단절하기..."
                                        />
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button 
                                            onClick={handleLoadSample}
                                            className="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-xl text-sm transition"
                                        >
                                            💡 샘플 가져오기
                                        </button>
                                        <button 
                                            onClick={handleGenerate}
                                            className="flex-1 py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl text-sm shadow-sm transition"
                                        >
                                            ✨ AI 서식 변환
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Database settings */}
                            <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                <h2 className="text-lg font-semibold text-slate-900 mb-2">⚙️ Supabase Cloud DB 연동</h2>
                                <p className="text-sm text-slate-500 mb-4">클라우드 DB에 데이터를 저장하여 언제 어디서든 조회하세요.</p>
                                
                                {!isSupabaseConnected ? (
                                    <form onSubmit={handleConnectSupabase} className="space-y-3">
                                        <div>
                                            <input 
                                                type="text" 
                                                placeholder="Supabase Project URL" 
                                                value={supabaseUrl}
                                                onChange={(e) => setSupabaseUrl(e.target.value)}
                                                className="w-full text-xs rounded-lg border-slate-200 p-2 border focus:ring-1 focus:ring-blue-500"
                                            />
                                        </div>
                                        <div>
                                            <input 
                                                type="password" 
                                                placeholder="Supabase Anon Public API Key" 
                                                value={supabaseKey}
                                                onChange={(e) => setSupabaseKey(e.target.value)}
                                                className="w-full text-xs rounded-lg border-slate-200 p-2 border focus:ring-1 focus:ring-blue-500"
                                            />
                                        </div>
                                        <button 
                                            type="submit"
                                            className="w-full py-2 bg-slate-900 hover:bg-black text-white text-xs font-semibold rounded-lg transition"
                                        >
                                            데이터베이스 연결하기
                                        </button>
                                    </form>
                                ) : (
                                    <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-xl">
                                        <p className="text-xs text-emerald-800 font-medium mb-2">✓ Cloud DB 연결 완료</p>
                                        <button 
                                            onClick={handleDisconnectSupabase}
                                            className="py-1 px-3 bg-white border border-emerald-200 text-emerald-700 text-xs rounded-lg hover:bg-emerald-100 font-medium transition"
                                        >
                                            연결 해제
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Right Column: Output / History */}
                        <div className="lg:col-span-7 space-y-6">
                            {/* Generated Output */}
                            <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-semibold text-slate-900">✨ 변환된 소셜 콘텐츠</h2>
                                    {results && (
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={handleSave}
                                                className="py-1.5 px-3 bg-blue-50 text-blue-700 hover:bg-blue-100 text-xs font-medium rounded-lg transition"
                                            >
                                                📁 DB에 저장
                                            </button>
                                            <button 
                                                onClick={handleDownloadAll}
                                                className="py-1.5 px-3 bg-slate-900 hover:bg-black text-white text-xs font-medium rounded-lg transition"
                                            >
                                                📥 일괄 다운로드
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {results ? (
                                    <div>
                                        {/* Tabs header */}
                                        <div className="flex border-b border-slate-200 mb-4 overflow-x-auto">
                                            <button 
                                                onClick={() => setActiveTab('blog')}
                                                className={`pb-3 px-4 text-sm font-medium border-b-2 whitespace-nowrap ${activeTab === 'blog' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                                            >
                                                📝 블로그 글
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('meditation')}
                                                className={`pb-3 px-4 text-sm font-medium border-b-2 whitespace-nowrap ${activeTab === 'meditation' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                                            >
                                                🧘 마음 명상
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('instagram')}
                                                className={`pb-3 px-4 text-sm font-medium border-b-2 whitespace-nowrap ${activeTab === 'instagram' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                                            >
                                                📸 인스타 캡션
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('youtube')}
                                                className={`pb-3 px-4 text-sm font-medium border-b-2 whitespace-nowrap ${activeTab === 'youtube' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}
                                            >
                                                🎥 유튜브 대본
                                            </button>
                                        </div>

                                        {/* Tab Contents */}
                                        <div className="space-y-4">
                                            {activeTab === 'blog' && (
                                                <div>
                                                    <div className="grid grid-cols-3 gap-2 mb-3">
                                                        {PRESET_IMAGES.map((img, idx) => (
                                                            <div key={idx} className="relative group rounded-lg overflow-hidden h-20">
                                                                <img src={img} alt="Mindfulness" className="object-cover w-full h-full" />
                                                                <div className="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                                    <a href={img} target="_blank" download className="text-white text-xs underline">보기</a>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <textarea 
                                                        readOnly 
                                                        value={results.blog}
                                                        rows="10"
                                                        className="w-full rounded-xl bg-slate-50 border-slate-200 text-slate-700 p-4 border text-sm font-mono"
                                                    />
                                                    <button 
                                                        onClick={() => handleCopy(results.blog)}
                                                        className="mt-2 text-xs text-blue-600 font-semibold hover:underline"
                                                    >
                                                        📋 블로그 글 복사하기
                                                    </button>
                                                </div>
                                            )}

                                            {activeTab === 'meditation' && (
                                                <div>
                                                    <textarea 
                                                        readOnly 
                                                        value={results.meditation}
                                                        rows="10"
                                                        className="w-full rounded-xl bg-slate-50 border-slate-200 text-slate-700 p-4 border text-sm font-mono"
                                                    />
                                                    <button 
                                                        onClick={() => handleCopy(results.meditation)}
                                                        className="mt-2 text-xs text-blue-600 font-semibold hover:underline"
                                                    >
                                                        📋 명상 가이드 복사하기
                                                    </button>
                                                </div>
                                            )}

                                            {activeTab === 'instagram' && (
                                                <div>
                                                    <textarea 
                                                        readOnly 
                                                        value={results.instagram}
                                                        rows="8"
                                                        className="w-full rounded-xl bg-slate-50 border-slate-200 text-slate-700 p-4 border text-sm font-mono"
                                                    />
                                                    <button 
                                                        onClick={() => handleCopy(results.instagram)}
                                                        className="mt-2 text-xs text-blue-600 font-semibold hover:underline"
                                                    >
                                                        📋 인스타 캡션 복사하기
                                                    </button>
                                                </div>
                                            )}

                                            {activeTab === 'youtube' && (
                                                <div>
                                                    <textarea 
                                                        readOnly 
                                                        value={results.youtube}
                                                        rows="10"
                                                        className="w-full rounded-xl bg-slate-50 border-slate-200 text-slate-700 p-4 border text-sm font-mono"
                                                    />
                                                    <button 
                                                        onClick={() => handleCopy(results.youtube)}
                                                        className="mt-2 text-xs text-blue-600 font-semibold hover:underline"
                                                    >
                                                        📋 유튜브 대본 복사하기
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-64 flex flex-col items-center justify-center text-center p-6 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                                        <div className="bg-slate-100 p-3 rounded-full mb-3 text-2xl">🌿</div>
                                        <h3 className="font-semibold text-slate-700">생성된 콘텐츠가 없습니다</h3>
                                        <p className="text-sm text-slate-400 max-w-sm mt-1">왼쪽 폼에 이야기를 적고 "AI 서식 변환" 버튼을 클릭하여 콘텐츠 생성을 시작해 보세요.</p>
                                    </div>
                                )}
                            </div>

                            {/* Saved Records History */}
                            <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                                    <h2 className="text-lg font-semibold text-slate-900">🗂️ 저장된 명상 일지 목록</h2>
                                    <div className="relative w-full sm:w-64">
                                        <input 
                                            type="text" 
                                            placeholder="주제 또는 본문 검색..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full pl-3 pr-3 py-1.5 text-xs rounded-lg border border-slate-200 focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        />
                                    </div>
                                </div>

                                {filteredRecords.length > 0 ? (
                                    <div className="space-y-4 max-h-96 overflow-y-auto pr-1">
                                        {filteredRecords.map((record) => (
                                            <div key={record.id} className="border border-slate-100 rounded-xl p-4 bg-slate-50/50 hover:bg-slate-50 transition relative group">
                                                <button 
                                                    onClick={() => handleDelete(record.id)}
                                                    className="absolute top-4 right-4 text-slate-300 hover:text-rose-500 transition text-sm font-bold"
                                                    title="기록 삭제"
                                                >
                                                    🗑️
                                                </button>
                                                <span className="text-[10px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded font-medium inline-block mb-2">
                                                    {record.category || '마음수련'}
                                                </span>
                                                <h3 className="font-bold text-slate-900 mb-1 text-sm">{record.title}</h3>
                                                <p className="text-xs text-slate-500 line-clamp-2 mb-3">{record.input_text}</p>
                                                <div className="flex gap-2">
                                                    <button 
                                                        onClick={() => {
                                                            setInputText(record.input_text);
                                                            setTopic(record.title);
                                                            setResults({
                                                                blog: record.result_blog,
                                                                meditation: record.result_meditation,
                                                                instagram: record.result_instagram,
                                                                youtube: record.result_youtube
                                                            });
                                                            showStatus('success', '과거 기록을 불러왔습니다.');
                                                        }}
                                                        className="text-xs text-slate-600 hover:text-blue-600 hover:underline font-medium"
                                                    >
                                                        📄 이 기록 불러오기
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <p className="text-xs text-slate-400 text-center py-6">저장된 기록이 없거나 검색 결과가 없습니다.</p>
                                )}
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t border-slate-100 py-6 text-center text-xs text-slate-400 mt-auto">
                        <p>© 2026 마음수련 콘텐츠 자동화 봇. All rights reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
